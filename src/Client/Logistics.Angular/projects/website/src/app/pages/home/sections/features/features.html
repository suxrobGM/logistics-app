<web-section-container sectionId="features" background="white">
  <div webScrollAnimate="fade-up">
    <web-section-header
      label="Features"
      title="What you get"
      subtitle="Tools built for trucking companies - the daily operations stuff, not generic SaaS."
    />
  </div>

  <!-- Highlighted Features - 2x2 Grid -->
  <div class="mt-16 grid grid-cols-1 gap-6 md:grid-cols-2">
    @for (feature of highlightedFeatures; track feature.title; let i = $index) {
      <div
        webScrollAnimate="fade-up"
        [delay]="i * 100"
        class="group bg-paper-dark rounded-2xl p-8 transition-all duration-300 hover:shadow-lg"
      >
        <div class="bg-accent mb-6 h-1 w-12 rounded-full"></div>
        <web-icon-circle [icon]="feature.icon" size="md" variant="accent" />
        <h3 class="font-display text-ink mt-5 text-xl font-bold">
          {{ feature.title }}
        </h3>
        <p class="text-steel mt-3 leading-relaxed">
          {{ feature.description }}
        </p>
      </div>
    }
  </div>

  <!-- Divider -->
  <div class="my-12 flex items-center gap-4" webScrollAnimate="fade-in">
    <div class="bg-ink/10 h-px flex-1"></div>
    <span class="font-display text-steel text-sm font-semibold tracking-widest uppercase">
      And more
    </span>
    <div class="bg-ink/10 h-px flex-1"></div>
  </div>

  <!-- Compact Features Grid -->
  <div class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-5">
    @for (feature of moreFeatures; track feature.title; let j = $index) {
      <div
        webScrollAnimate="fade-up"
        [delay]="j * 50"
        class="group hover:bg-paper-dark relative rounded-xl p-4 transition-colors duration-300"
      >
        <div class="flex items-start gap-3">
          <web-icon-circle [icon]="feature.icon" size="sm" variant="outlined" />
          <div class="min-w-0">
            <h4 class="font-display text-ink text-base font-semibold">
              {{ feature.title }}
            </h4>
          </div>
        </div>
        <div
          class="bg-paper-dark pointer-events-none absolute top-full left-0 z-10 w-full rounded-b-xl px-4 pb-4 opacity-0 shadow-lg transition-opacity duration-300 group-hover:opacity-100"
        >
          <p class="text-steel text-sm leading-relaxed">
            {{ feature.description }}
          </p>
        </div>
      </div>
    }
  </div>
</web-section-container>
