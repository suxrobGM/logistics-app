<p-card class="h-full border-0 shadow-sm">
  <ui-stack direction="row" align="center" gap="4">
    <div class="stat-icon-ring flex h-14 w-14 shrink-0 items-center justify-center rounded-full">
      <ui-icon [name]="icon()" size="xl" color="inherit" />
    </div>
    <div class="grow">
      <ui-stack direction="row" align="center" gap="1" class="mb-1">
        <ui-typography variant="h6" color="muted" tag="h6" class="m-0">{{ label() }}</ui-typography>
        @if (tooltip()) {
          <ui-icon
            name="info-circle"
            size="xs"
            color="muted"
            [pTooltip]="tooltip()!"
            tooltipPosition="top"
          />
        }
      </ui-stack>
      <ui-typography variant="h3" color="primary" tag="div" class="m-0 font-mono">
        {{ value() }}
      </ui-typography>
      @if (trend()) {
        <small [class]="trendClasses()">
          @if (trendIcon(); as iconName) {
            <ui-icon [name]="iconName" size="sm" color="inherit" />
          }
          {{ trend() }}
        </small>
      }
    </div>
  </ui-stack>
</p-card>
