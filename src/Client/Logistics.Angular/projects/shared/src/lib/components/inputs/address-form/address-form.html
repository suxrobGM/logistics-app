<form [formGroup]="form">
  <ui-validation-summary [form]="form" />

  <ui-form-field label="Address Line 1" for="addressLine1" [required]="true">
    <input pInputText id="addressLine1" formControlName="addressLine1" class="w-full" />
  </ui-form-field>

  <ui-form-field label="Address Line 2" for="addressLine2" hint="Optional">
    <input pInputText id="addressLine2" formControlName="addressLine2" class="w-full" />
  </ui-form-field>

  <ui-form-field label="City" for="city" [required]="true">
    <input pInputText id="city" formControlName="city" class="w-full" />
  </ui-form-field>

  <ui-form-field label="State / Region" for="state" [required]="true">
    @if (hasStateOptions()) {
      <p-select
        inputId="state"
        formControlName="state"
        [options]="stateOptions()"
        placeholder="Select a state"
        class="w-full"
        [filter]="true"
      />
    } @else {
      <input pInputText id="state" formControlName="state" class="w-full" />
    }
  </ui-form-field>

  <ui-form-field label="Zip Code" for="zipCode" [required]="true">
    <input pInputText id="zipCode" formControlName="zipCode" class="w-full" />
  </ui-form-field>

  <ui-form-field label="Country" for="country" [required]="true">
    <p-select
      inputId="country"
      formControlName="country"
      [options]="countries()"
      placeholder="Select a country"
      class="w-full"
      [filter]="true"
    />
  </ui-form-field>
</form>
