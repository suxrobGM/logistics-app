<div class="flex flex-col items-center justify-center py-12 text-center">
  <i class="pi pi-exclamation-triangle mb-4 text-6xl text-orange-500 dark:text-orange-400"></i>
  <h3 class="text-gray-900 dark:text-white mb-2">{{ title() }}</h3>
  <p class="text-gray-600 dark:text-gray-400 mb-6 max-w-md">{{ message() }}</p>
  <div class="flex gap-2">
    @if (retryable()) {
      <p-button label="Retry" icon="pi pi-refresh" (onClick)="onRetry()" />
    }
    @if (showLogout()) {
      <p-button label="Log Out" icon="pi pi-sign-out" severity="secondary" (onClick)="onLogout()" />
    }
  </div>
</div>
