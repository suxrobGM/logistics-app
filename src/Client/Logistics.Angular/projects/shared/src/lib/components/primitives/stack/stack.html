@if (tag() === "section") {
  <section [class]="classes()"><ng-content /></section>
} @else if (tag() === "header") {
  <header [class]="classes()"><ng-content /></header>
} @else if (tag() === "footer") {
  <footer [class]="classes()"><ng-content /></footer>
} @else {
  <div [class]="classes()"><ng-content /></div>
}
