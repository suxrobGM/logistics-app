<ng-template #content><ng-content /></ng-template>
@switch (tag()) {
  @case ("section") {
    <section [class]="classes()"><ng-container *ngTemplateOutlet="content" /></section>
  }
  @case ("header") {
    <header [class]="classes()"><ng-container *ngTemplateOutlet="content" /></header>
  }
  @case ("footer") {
    <footer [class]="classes()"><ng-container *ngTemplateOutlet="content" /></footer>
  }
  @default {
    <div [class]="classes()"><ng-container *ngTemplateOutlet="content" /></div>
  }
}
