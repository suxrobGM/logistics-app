<ui-page-header [title]="'Feature Configuration: ' + (tenant()?.companyName ?? 'Loading...')">
  <div class="flex gap-2">
    <p-button icon="pi pi-arrow-left" label="Back" severity="secondary" (onClick)="goBack()" />
    <p-button icon="pi pi-save" label="Save Changes" [loading]="isSaving()" (onClick)="saveAll()" />
  </div>
</ui-page-header>

<p-card>
  @if (isLoading()) {
    <div class="flex justify-center py-8">
      <p-progress-spinner />
    </div>
  } @else {
    <p class="text-muted-color mb-4">
      Configure feature settings for this tenant. Locked features cannot be changed by the tenant
      owner.
    </p>

    <div class="flex flex-col gap-2">
      @for (feature of features(); track feature.feature) {
        <ui-feature-row
          [name]="feature.name ?? ''"
          [description]="getFeatureDescription(feature.feature)"
        >
          <label [for]="'enabled-' + feature.feature" class="flex items-center gap-2 text-sm">
            <span class="text-muted-color">Enabled</span>
            <p-toggleswitch
              [inputId]="'enabled-' + feature.feature"
              [ngModel]="feature.isEnabled"
              (onChange)="toggleEnabled(feature)"
            />
          </label>
          <label
            [for]="'locked-' + feature.feature"
            class="flex items-center gap-2 text-sm"
            pTooltip="When locked, the tenant owner cannot change this setting"
            tooltipPosition="top"
          >
            <span class="text-muted-color">Locked</span>
            <p-toggleswitch
              [inputId]="'locked-' + feature.feature"
              [ngModel]="feature.isAdminLocked"
              (onChange)="toggleLocked(feature)"
            />
          </label>
        </ui-feature-row>
      } @empty {
        <p class="text-muted-color py-4 text-center">No features available</p>
      }
    </div>
  }
</p-card>
