<ui-page-header title="Default Feature Configuration">
  <p-button icon="pi pi-save" label="Save Changes" [loading]="isSaving()" (onClick)="saveAll()" />
</ui-page-header>

<p-card>
  @if (isLoading()) {
    <div class="flex justify-center py-8">
      <p-progress-spinner />
    </div>
  } @else {
    <p class="text-muted-color mb-4">
      Configure the default feature settings for new tenants. These settings will be applied when a
      new tenant is created.
    </p>

    <div class="flex flex-col gap-2">
      @for (feature of features(); track feature.feature) {
        <ui-feature-row
          [name]="feature.name ?? ''"
          [description]="getFeatureDescription(feature.feature)"
        >
          <p-toggleswitch
            [ngModel]="feature.isEnabledByDefault"
            (onChange)="toggleFeature(feature)"
          />
        </ui-feature-row>
      } @empty {
        <p class="text-muted-color py-4 text-center">No features available</p>
      }
    </div>
  }
</p-card>
