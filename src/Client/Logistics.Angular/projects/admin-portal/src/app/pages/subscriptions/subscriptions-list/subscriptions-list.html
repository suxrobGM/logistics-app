<ui-page-header
  title="Subscriptions"
  addRoute="/subscriptions/add"
  addTooltip="Add a new subscription"
/>

<p-card>
  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No subscriptions yet"
    emptyMessage="Add your first subscription to get started."
    emptyActionLabel="Add Subscription"
    (retry)="store.retry()"
    (emptyAction)="addSubscription()"
  >
    <p-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (onLazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #caption>
        <ui-search-input (searchChange)="search($event)" />
      </ng-template>
      <ng-template #header>
        <tr>
          <th>Tenant</th>
          <th>Plan</th>
          <th>Status</th>
          <th pSortableColumn="StartDate">
            Start Date
            <p-sortIcon field="StartDate" />
          </th>
          <th>Next Billing</th>
          <th class="w-16"></th>
        </tr>
      </ng-template>
      <ng-template #body let-sub>
        <tr>
          <td>
            <a [routerLink]="['/tenants', sub.tenant?.id, 'edit']" class="font-medium">
              {{ sub.tenant?.name ?? "Unknown" }}
            </a>
          </td>
          <td>{{ sub.plan?.name ?? "-" }}</td>
          <td>
            <p-tag [value]="sub.status ?? 'unknown'" [severity]="getStatusSeverity(sub.status)" />
          </td>
          <td>{{ sub.startDate | date: "mediumDate" }}</td>
          <td>{{ sub.nextBillingDate | date: "mediumDate" }}</td>
          <td>
            <p-button
              icon="pi pi-ellipsis-v"
              [text]="true"
              (click)="openActionMenu($event, sub)"
              aria-label="Show actions menu"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ui-data-container>
</p-card>

<p-menu #actionMenu [model]="actionMenuItems()" [popup]="true" />
