<ui-typography variant="h2" tag="h1">Dashboard</ui-typography>
<p-divider />

<ui-grid container spacing="4" class="mt-4">
  @if (isLoading()) {
    @for (_ of [1, 2, 3, 4]; track $index) {
      <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
        <p-skeleton height="8rem" styleClass="w-full" />
      </ui-grid>
    }
  } @else {
    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <p-card styleClass="h-full">
        <ui-stack direction="row" align="center" gap="4">
          <div class="flex h-12 w-12 items-center justify-center rounded-full bg-blue-100">
            <ui-icon name="building" size="lg" class="text-blue-600" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Total Tenants</ui-typography>
            <ui-typography variant="stat">{{ tenantCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <p-button
            label="View All"
            icon="pi pi-arrow-right"
            iconPos="right"
            [link]="true"
            routerLink="/tenants"
          />
        </div>
      </p-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <p-card class="h-full">
        <ui-stack direction="row" align="center" gap="4">
          <div class="flex h-12 w-12 items-center justify-center rounded-full bg-green-100">
            <ui-icon name="credit-card" size="lg" class="text-green-600" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Active Subscriptions</ui-typography>
            <ui-typography variant="stat">{{ subscriptionCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <p-button
            label="View All"
            icon="pi pi-arrow-right"
            iconPos="right"
            [link]="true"
            routerLink="/subscriptions"
          />
        </div>
      </p-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <p-card styleClass="h-full">
        <ui-stack direction="row" align="center" gap="4">
          <div class="flex h-12 w-12 items-center justify-center rounded-full bg-purple-100">
            <ui-icon name="box" size="lg" class="text-purple-600" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Subscription Plans</ui-typography>
            <ui-typography variant="stat">{{ planCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <p-button
            label="View All"
            icon="pi pi-arrow-right"
            iconPos="right"
            [link]="true"
            routerLink="/subscription-plans"
          />
        </div>
      </p-card>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6, lg: 3 }">
      <p-card styleClass="h-full">
        <ui-stack direction="row" align="center" gap="4">
          <div class="flex h-12 w-12 items-center justify-center rounded-full bg-orange-100">
            <ui-icon name="users" size="lg" class="text-orange-600" />
          </div>
          <div>
            <ui-typography variant="caption" color="muted">Admin Users</ui-typography>
            <ui-typography variant="stat">{{ userCount() }}</ui-typography>
          </div>
        </ui-stack>
        <div class="mt-4">
          <p-button
            label="View All"
            icon="pi pi-arrow-right"
            iconPos="right"
            [link]="true"
            routerLink="/users"
          />
        </div>
      </p-card>
    </ui-grid>
  }
</ui-grid>

<ui-grid container spacing="4" class="mt-8">
  <ui-grid [size]="{ xs: 12, lg: 6 }">
    <p-card>
      <ng-template #header>
        <ui-typography variant="h6" tag="h4" class="py-2 pl-4">Quick Actions</ui-typography>
        <p-divider class="m-0" />
      </ng-template>
      <ui-stack direction="row" gap="3" wrap>
        <p-button label="Add Tenant" icon="pi pi-plus" routerLink="/tenants/add" />
        <p-button
          label="Add Plan"
          icon="pi pi-plus"
          severity="secondary"
          routerLink="/subscription-plans/add"
        />
        <p-button
          label="Add Subscription"
          icon="pi pi-plus"
          severity="secondary"
          routerLink="/subscriptions/add"
        />
      </ui-stack>
    </p-card>
  </ui-grid>
</ui-grid>
