<p-drawer
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  position="left"
  [modal]="true"
  [closeOnEscape]="true"
  [dismissible]="true"
  [showCloseIcon]="true"
  styleClass="mobile-nav-drawer"
>
  <ng-template #header>
    <div class="mobile-nav-header">
      @if (companyLogoUrl()) {
        <img [src]="companyLogoUrl()" class="mobile-nav-logo" alt="Company logo" />
      } @else {
        <img src="images/logo.svg" class="mobile-nav-logo" alt="Logo" />
      }
      @if (companyName()) {
        <h4 class="mobile-nav-company">{{ companyName() }}</h4>
      }
    </div>
  </ng-template>

  <nav class="mobile-nav-menu flex h-full flex-col">
    <!-- Search trigger -->
    <button class="mobile-search-trigger" (click)="openSearch()" type="button">
      <i class="pi pi-search"></i>
      <span>Search...</span>
    </button>

    <!-- Favorites -->
    <app-favorites-bar
      [sections]="filteredSections()"
      [collapsed]="false"
      (navigate)="onFavoriteNavigate()"
    />

    <!-- Navigation -->
    <app-nav-menu
      [sections]="filteredSections()"
      [collapsed]="false"
      (itemClick)="onNavItemClick()"
    />

    <!-- Footer -->
    <div class="border-subtle border-t px-4 py-3">
      <!-- Notifications + Theme row -->
      <div class="flex items-center gap-2 pb-2.5">
        <app-notification-bell [expanded]="false" />
        <app-theme-toggle [showLabel]="false" />
      </div>

      <!-- User profile button -->
      @if (userFullName()) {
        <button
          class="text-secondary hover:bg-hover hover:text-primary flex w-full cursor-pointer items-center gap-3 rounded-md border-none bg-transparent px-1 py-2 text-left text-[0.9375rem] font-medium transition-all"
          (click)="mobileUserPopover.toggle($event)"
          type="button"
        >
          <div
            class="bg-accent/12 border-accent/20 flex size-9 shrink-0 items-center justify-center rounded-full border"
          >
            <i class="pi pi-user text-accent text-sm"></i>
          </div>
          <div class="min-w-0 flex-1">
            <span class="block truncate text-sm font-medium">{{ userFullName() }}</span>
            @if (userRole()) {
              <span
                class="text-accent block text-[0.6875rem] font-semibold tracking-wider uppercase"
                >{{ userRole() }}</span
              >
            }
          </div>
          <i class="pi pi-ellipsis-v text-muted text-xs"></i>
        </button>
      }
    </div>
  </nav>
</p-drawer>

<!-- User profile popover -->
<p-popover #mobileUserPopover appendTo="body">
  <div class="w-52">
    @if (userFullName()) {
      <div class="border-subtle border-b px-3.5 py-2.5">
        <div class="text-primary text-sm font-semibold">{{ userFullName() }}</div>
        @if (userRole()) {
          <div class="text-accent text-[0.6875rem] font-medium">{{ userRole() }}</div>
        }
      </div>
    }
    <div class="p-1">
      <button
        class="text-secondary hover:bg-hover hover:text-primary flex w-full cursor-pointer items-center gap-2.5 rounded-md border-none bg-transparent px-3 py-2 text-left text-[0.8125rem] font-medium transition-all"
        (click)="openAccountUrl(); mobileUserPopover.hide()"
        type="button"
      >
        <i class="pi pi-user-edit text-muted w-5 text-center"></i>
        <span>Manage Profile</span>
      </button>
      <button
        class="text-danger hover:bg-danger/10 flex w-full cursor-pointer items-center gap-2.5 rounded-md border-none bg-transparent px-3 py-2 text-left text-[0.8125rem] font-medium transition-all"
        (click)="logout(); mobileUserPopover.hide()"
        type="button"
      >
        <i class="pi pi-sign-out w-5 text-center"></i>
        <span>Sign Out</span>
      </button>
    </div>
  </div>
</p-popover>
