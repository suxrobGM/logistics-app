<span
  class="bg-subtle border-default inline-flex items-center gap-1.5 rounded-lg border px-2.5 py-1 text-sm"
  [pTooltip]="tooltipHtml()"
  [escape]="false"
  [showDelay]="400"
  tooltipPosition="bottom"
>
  <span class="text-primary font-medium">{{ originShort() }}</span>
  <i class="pi pi-arrow-right text-muted text-xs"></i>
  <span class="text-primary font-medium">{{ destinationShort() }}</span>
</span>
