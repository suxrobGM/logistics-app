<div class="w-full">
  <div
    class="relative mx-auto aspect-video w-full overflow-hidden"
    [style.maxWidth.px]="diagramWidth"
  >
    <img
      [src]="imageSrc"
      alt="Commercial truck side profile"
      class="block h-full w-full object-contain select-none"
      draggable="false"
    />

    @for (marker of markers(); track $index) {
      <button
        type="button"
        [class]="'vehicle-diagram__marker ' + getSeverityClass(marker.severity)"
        [style.left.%]="getMarkerX(marker)"
        [style.top.%]="getMarkerY(marker)"
        [pTooltip]="getTooltipText(marker)"
        tooltipPosition="top"
        [attr.aria-label]="getTooltipText(marker)"
      >
        <span>{{ $index + 1 }}</span>
      </button>
    }
  </div>

  @if (showLegend() && markers().length > 0) {
    <div class="mt-4 flex flex-wrap gap-4 text-sm">
      <div class="inline-flex items-center gap-2">
        <span class="vehicle-diagram__legend-dot vehicle-diagram__marker--minor"></span>
        <span>Minor</span>
      </div>
      <div class="inline-flex items-center gap-2">
        <span class="vehicle-diagram__legend-dot vehicle-diagram__marker--moderate"></span>
        <span>Moderate</span>
      </div>
      <div class="inline-flex items-center gap-2">
        <span class="vehicle-diagram__legend-dot vehicle-diagram__marker--severe"></span>
        <span>Severe</span>
      </div>
    </div>
  }
</div>
