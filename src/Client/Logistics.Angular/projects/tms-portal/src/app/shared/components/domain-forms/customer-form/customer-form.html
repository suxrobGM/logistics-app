<div class="flex flex-col gap-6">
  @if (isLoading()) {
    <p-progress-spinner />
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <ui-validation-summary [form]="form" />

    <ui-form-field label="Customer Name" for="name" [required]="true">
      <input
        pInputText
        id="name"
        formControlName="name"
        class="w-full"
        placeholder="Customer name"
      />
    </ui-form-field>

    <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
      <ui-form-field label="Email" for="email">
        <input
          pInputText
          id="email"
          formControlName="email"
          type="email"
          class="w-full"
          placeholder="email@example.com"
        />
      </ui-form-field>

      <ui-form-field label="Phone" for="phone">
        <input
          pInputText
          id="phone"
          formControlName="phone"
          type="tel"
          class="w-full"
          placeholder="(555) 555-5555"
        />
      </ui-form-field>
    </div>

    <ui-form-field label="Status" for="status" class="mt-4">
      <p-select
        formControlName="status"
        id="status"
        class="w-full"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
      />
    </ui-form-field>

    <ui-form-field label="Address" class="mt-4">
      <ui-address-form formControlName="address" [allowedCountries]="allowedCountries()" />
    </ui-form-field>

    <ui-form-field label="Notes" for="notes" class="mt-4">
      <textarea
        pInputTextarea
        formControlName="notes"
        id="notes"
        class="w-full"
        rows="3"
        placeholder="Additional notes about this customer..."
      ></textarea>
    </ui-form-field>

    <div class="mt-6 flex gap-2">
      <p-button type="submit" icon="pi pi-check" label="Save" [disabled]="isLoading()" />

      @if (mode() === "edit") {
        <p-button
          type="button"
          icon="pi pi-trash"
          label="Delete"
          severity="danger"
          [disabled]="isLoading()"
          (click)="askRemove()"
        />

        <p-button
          type="button"
          icon="pi pi-arrow-left"
          label="Back to list"
          [outlined]="true"
          [routerLink]="['/customers']"
        />
      }
    </div>
  </form>
</div>
