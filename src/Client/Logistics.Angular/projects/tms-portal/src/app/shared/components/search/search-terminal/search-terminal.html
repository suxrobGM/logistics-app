<p-autocomplete
  class="w-full"
  inputStyleClass="w-full"
  [placeholder]="placeholder()"
  [minLength]="2"
  [delay]="300"
  optionLabel="name"
  [suggestions]="suggestedTerminals()"
  [(ngModel)]="selectedTerminal"
  (completeMethod)="searchTerminal($event)"
  (onSelect)="changeSelectedTerminal($event)"
>
  <ng-template #empty>
    <div class="p-2">
      <span class="text-muted text-sm">
        No terminals matching <b>"{{ lastQuery() }}"</b>
      </span>
    </div>
  </ng-template>
  <ng-template let-terminal #item>
    <div class="flex flex-col">
      <div class="font-medium">{{ terminal.code }} - {{ terminal.name }}</div>
      <div class="text-muted text-xs">{{ terminal.countryCode }}</div>
    </div>
  </ng-template>
</p-autocomplete>
