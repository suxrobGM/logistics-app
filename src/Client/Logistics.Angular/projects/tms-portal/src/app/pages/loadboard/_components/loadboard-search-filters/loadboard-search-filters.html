<form [formGroup]="form" (ngSubmit)="submit()">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin City" for="originCity">
        <input
          pInputText
          id="originCity"
          formControlName="originCity"
          class="w-full"
          placeholder="e.g., Los Angeles"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin State" for="originState">
        <input
          pInputText
          id="originState"
          formControlName="originState"
          class="w-full"
          placeholder="e.g., CA"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Origin Radius ({{ distanceUnitLabel() }})" for="originRadius">
        <p-inputNumber
          id="originRadius"
          formControlName="originRadius"
          [min]="0"
          [max]="500"
          class="w-full"
          inputStyleClass="w-full"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Destination City" for="destinationCity">
        <input
          pInputText
          id="destinationCity"
          formControlName="destinationCity"
          class="w-full"
          placeholder="e.g., Dallas"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Destination State" for="destinationState">
        <input
          pInputText
          id="destinationState"
          formControlName="destinationState"
          class="w-full"
          placeholder="e.g., TX"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Dest. Radius ({{ distanceUnitLabel() }})" for="destinationRadius">
        <p-inputNumber
          id="destinationRadius"
          formControlName="destinationRadius"
          [min]="0"
          [max]="500"
          class="w-full"
          inputStyleClass="w-full"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Pickup From" for="pickupDateStart">
        <p-datePicker
          id="pickupDateStart"
          formControlName="pickupDateStart"
          [showIcon]="true"
          dateFormat="mm/dd/yy"
          class="w-full"
          inputStyleClass="w-full"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Pickup To" for="pickupDateEnd">
        <p-datePicker
          id="pickupDateEnd"
          formControlName="pickupDateEnd"
          [showIcon]="true"
          dateFormat="mm/dd/yy"
          class="w-full"
          inputStyleClass="w-full"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Equipment Types" for="equipmentTypes">
        <p-multiSelect
          id="equipmentTypes"
          formControlName="equipmentTypes"
          [options]="equipmentOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Any equipment"
          class="w-full"
          [style]="{ width: '100%' }"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 4, lg: 3 }">
      <ui-form-field label="Max Results" for="maxResults">
        <p-inputNumber
          id="maxResults"
          formControlName="maxResults"
          [min]="10"
          [max]="100"
          class="w-full"
          inputStyleClass="w-full"
        />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-stack direction="row" justify="end" class="mt-4">
    <p-button label="Search Loads" icon="pi pi-search" type="submit" [loading]="searching()" />
  </ui-stack>
</form>
