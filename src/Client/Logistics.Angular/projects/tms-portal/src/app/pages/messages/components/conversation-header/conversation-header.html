<ui-stack
  direction="row"
  align="center"
  gap="4"
  class="from-primary/5 border-b bg-linear-to-r to-transparent px-4 py-3"
>
  <p-button icon="pi pi-arrow-left" [text]="true" [rounded]="true" routerLink="/messages" />

  @if (isNewConversation()) {
    <ui-icon name="plus-circle" size="lg" color="primary" />
    <div class="flex-1">
      <ui-typography variant="h5" tag="h2" weight="semibold">New Conversation</ui-typography>
      <ui-typography variant="caption" color="muted">
        Select a recipient to start messaging
      </ui-typography>
    </div>
  } @else {
    <app-user-avatar [initials]="getInitials(getConversationTitle(conversation()))" size="large" />
    <div
      class="flex-1 cursor-pointer"
      role="button"
      tabindex="0"
      (click)="toggleDetails.emit()"
      (keydown.enter)="toggleDetails.emit()"
    >
      <ui-typography variant="h5" tag="h2" weight="semibold">
        {{ getConversationTitle(conversation()) }}
      </ui-typography>
      @if (isTyping()) {
        <ui-typography variant="body-sm" color="primary" class="animate-pulse">
          typing...
        </ui-typography>
      } @else {
        <ui-typography variant="caption" color="muted">Click to view details</ui-typography>
      }
    </div>
    <p-button
      icon="pi pi-info-circle"
      [text]="true"
      [rounded]="true"
      (onClick)="toggleDetails.emit()"
      pTooltip="View details"
    />
  }
</ui-stack>
