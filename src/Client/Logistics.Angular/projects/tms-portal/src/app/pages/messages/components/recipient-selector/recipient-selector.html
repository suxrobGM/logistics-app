<ui-stack align="center" justify="center" class="h-full">
  <ui-stack gap="6" class="w-full max-w-md">
    <ui-stack align="center" gap="2" class="text-center">
      <div
        class="bg-primary/10 mx-auto mb-4 flex h-20 w-20 items-center justify-center rounded-full"
      >
        <ui-icon name="user-plus" size="xl" color="primary" />
      </div>
      <ui-typography variant="h5" tag="h3" weight="semibold" color="secondary">
        Start a New Conversation
      </ui-typography>
      <ui-typography variant="body-sm" color="muted">
        Search for an employee to message
      </ui-typography>
    </ui-stack>

    <ui-stack gap="2">
      <ui-typography variant="body-sm" weight="medium" color="secondary">To:</ui-typography>
      @if (selected(); as recipient) {
        <ui-stack
          direction="row"
          align="center"
          gap="3"
          class="border-subtle bg-surface rounded-lg border p-3"
        >
          <app-user-avatar [initials]="getInitials(recipient.fullName)" />
          <div class="flex-1">
            <p class="text-primary font-medium">{{ recipient.fullName }}</p>
            <p class="text-muted text-xs">{{ recipient.email }}</p>
          </div>
          <p-button
            icon="pi pi-times"
            [text]="true"
            [rounded]="true"
            (onClick)="clearRecipient()"
            pTooltip="Remove"
          />
        </ui-stack>
      } @else {
        <p-autocomplete
          [suggestions]="employeeSuggestions()"
          (completeMethod)="searchEmployees($event)"
          (onSelect)="onRecipientSelect($event)"
          optionLabel="fullName"
          placeholder="Search employees..."
          [minLength]="2"
          class="w-full"
          inputStyleClass="w-full"
        >
          <ng-template let-employee #item>
            <div class="flex items-center gap-3 py-1">
              <p-avatar
                [label]="getInitials(employee.fullName)"
                class="bg-surface-500 dark:bg-surface-400 text-white"
                size="normal"
                shape="circle"
              />
              <div>
                <p class="font-medium">{{ employee.fullName }}</p>
                <p class="text-muted text-xs">{{ employee.email }}</p>
              </div>
            </div>
          </ng-template>
        </p-autocomplete>
      }
    </ui-stack>

    @if (selected()) {
      <ui-typography variant="body-sm" color="muted" align="center">
        Type a message below to start your conversation
      </ui-typography>
    }
  </ui-stack>
</ui-stack>
