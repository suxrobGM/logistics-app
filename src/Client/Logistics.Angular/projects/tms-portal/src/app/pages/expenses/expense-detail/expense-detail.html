<ui-container maxWidth="md">
  <ui-page-header title="Expense Details" backLink="/expenses">
    @if (canApproveOrReject()) {
      <p-button icon="pi pi-check" label="Approve" severity="success" (click)="onApprove()" />
      <p-button
        icon="pi pi-times"
        label="Reject"
        severity="danger"
        [outlined]="true"
        (click)="onReject()"
      />
    }
    <p-button icon="pi pi-pencil" label="Edit" [outlined]="true" (click)="onEdit()" />
  </ui-page-header>

  @if (isLoading()) {
    <div class="flex justify-center py-16">
      <p-progress-spinner />
    </div>
  } @else if (expense(); as e) {
    <ui-grid container spacing="6">
      <ui-grid [size]="{ xs: 12, lg: 6 }">
        <app-expense-detail-info-card [expense]="e" />
      </ui-grid>
      <ui-grid [size]="{ xs: 12, lg: 6 }">
        <app-expense-detail-extra-card [expense]="e" (viewReceipt)="viewReceipt()" />
      </ui-grid>
      <ui-grid [size]="12">
        <app-expense-detail-audit-card [expense]="e" />
      </ui-grid>
    </ui-grid>
  } @else {
    <p-card>
      <div class="py-16 text-center">
        <i class="pi pi-exclamation-circle text-muted mb-4 text-4xl"></i>
        <ui-typography color="muted">Expense not found</ui-typography>
        <p-button label="Back to Expenses" [routerLink]="['/expenses']" class="mt-4" />
      </div>
    </p-card>
  }
</ui-container>

<app-reject-expense-dialog />
