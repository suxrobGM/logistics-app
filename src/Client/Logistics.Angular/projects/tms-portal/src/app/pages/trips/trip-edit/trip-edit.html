<ui-typography variant="h2" tag="h1" align="center">Edit a trip #{{ tripNumber() }}</ui-typography>

<ui-container maxWidth="md">
  <p-card>
    <app-trip-wizard
      [mode]="'edit'"
      [disabled]="disabledForEditing()"
      [initialData]="initialData()"
      (remove)="confirmToDelete()"
      (save)="updateTrip($event)"
    />
  </p-card>
</ui-container>
