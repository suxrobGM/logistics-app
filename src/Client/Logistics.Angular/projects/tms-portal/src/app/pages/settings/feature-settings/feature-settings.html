<ui-page-header title="Feature Settings" [centered]="true" />

<ui-container maxWidth="md">
  <p-card>
    @if (isLoading()) {
      <ui-stack align="center" justify="center" class="py-8">
        <p-progress-spinner />
      </ui-stack>
    } @else {
      <ui-typography variant="body" color="muted" class="mb-6">
        Enable or disable features for your organization. Disabled features will be hidden from all
        users and inaccessible via API.
      </ui-typography>

      <ui-stack gap="2">
        @for (feature of features(); track feature.feature) {
          <ui-feature-row
            [name]="feature.name ?? ''"
            [description]="getFeatureDescription(feature.feature)"
            [locked]="feature.isAdminLocked ?? false"
            lockedTooltip="This feature is locked by the administrator"
          >
            <p-toggleswitch
              [ngModel]="feature.isEnabled"
              [disabled]="(feature.isAdminLocked ?? false) || isSaving() === feature.feature"
              (onChange)="toggleFeature(feature)"
            />
          </ui-feature-row>
        }
      </ui-stack>

      @if (features().length === 0) {
        <ui-stack align="center" gap="2" class="text-muted py-8">
          <ui-icon name="info-circle" size="xl" />
          <p>No features available to configure.</p>
        </ui-stack>
      }
    }
  </p-card>
</ui-container>
