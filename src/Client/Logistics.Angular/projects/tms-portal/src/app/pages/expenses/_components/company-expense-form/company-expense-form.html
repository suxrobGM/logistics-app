<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 pt-4">
  <ui-grid container spacing="4">
    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Amount" for="company-amount" [required]="true">
        <p-inputNumber
          id="company-amount"
          formControlName="amount"
          mode="currency"
          currency="USD"
          [min]="0"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Category" for="company-category" [required]="true">
        <p-select
          id="company-category"
          formControlName="category"
          [options]="categories"
          optionLabel="label"
          optionValue="value"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Vendor Name" for="company-vendor">
        <input pInputText id="company-vendor" formControlName="vendorName" class="w-full" />
      </ui-form-field>
    </ui-grid>

    <ui-grid [size]="{ xs: 12, md: 6 }">
      <ui-form-field label="Expense Date" for="company-date" [required]="true">
        <p-datepicker
          id="company-date"
          formControlName="expenseDate"
          [showIcon]="true"
          [fluid]="true"
        />
      </ui-form-field>
    </ui-grid>
  </ui-grid>

  <ui-form-field label="Notes" for="company-notes">
    <textarea
      pInputTextarea
      id="company-notes"
      formControlName="notes"
      rows="3"
      class="w-full"
    ></textarea>
  </ui-form-field>

  <app-expense-receipt-upload
    [initialPath]="receiptPath()"
    (uploaded)="onReceiptUploaded($event)"
  />

  <ui-stack direction="row" justify="end" gap="2" class="pt-4">
    <p-button
      label="Cancel"
      [routerLink]="mode() === 'edit' ? ['/expenses', initial()?.id] : ['/expenses']"
      [outlined]="true"
    />
    <p-button
      type="submit"
      [label]="mode() === 'edit' ? 'Save Changes' : 'Create Expense'"
      icon="pi pi-save"
      [loading]="isSaving()"
    />
  </ui-stack>
</form>
