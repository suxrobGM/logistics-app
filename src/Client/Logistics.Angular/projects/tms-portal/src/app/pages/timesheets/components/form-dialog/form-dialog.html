<p-dialog
  [header]="dialogTitle"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '500px' }"
  (onHide)="close()"
>
  @if (isLoading()) {
    <ui-stack align="center" justify="center" class="py-4">
      <p-progress-spinner />
    </ui-stack>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (!isEditMode) {
        <ui-form-field
          label="Employee"
          for="employeeId"
          [required]="true"
          [control]="form.controls.employeeId"
        >
          <p-select
            formControlName="employeeId"
            id="employeeId"
            class="w-full"
            appendTo="body"
            [options]="employees()"
            optionValue="id"
            optionLabel="fullName"
            placeholder="Select an employee"
            [filter]="true"
            filterBy="fullName"
          />
        </ui-form-field>
      }

      <ui-form-field label="Date" for="date" [required]="true" [control]="form.controls.date">
        <p-datepicker
          formControlName="date"
          id="date"
          dateFormat="mm/dd/yy"
          [showIcon]="true"
          appendTo="body"
          styleClass="w-full"
        />
      </ui-form-field>

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field
            label="Start Time"
            for="startTime"
            [required]="true"
            [control]="form.controls.startTime"
          >
            <p-datepicker
              formControlName="startTime"
              id="startTime"
              [timeOnly]="true"
              [showIcon]="true"
              appendTo="body"
              styleClass="w-full"
              (onSelect)="calculateHours()"
            />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field
            label="End Time"
            for="endTime"
            [required]="true"
            [control]="form.controls.endTime"
          >
            <p-datepicker
              formControlName="endTime"
              id="endTime"
              [timeOnly]="true"
              [showIcon]="true"
              appendTo="body"
              styleClass="w-full"
              (onSelect)="calculateHours()"
            />
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      @if (timeError()) {
        <ui-stack direction="row" align="center" gap="1" class="text-red-500 text-sm mb-2">
          <ui-icon name="exclamation-circle" />
          <span>{{ timeError() }}</span>
        </ui-stack>
      }

      <ui-grid container spacing="4">
        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field
            label="Total Hours"
            for="totalHours"
            hint="Calculated from start and end time"
          >
            <p-inputNumber
              formControlName="totalHours"
              id="totalHours"
              mode="decimal"
              [minFractionDigits]="1"
              [maxFractionDigits]="2"
              [min]="0"
              [max]="24"
              styleClass="w-full"
            />
          </ui-form-field>
        </ui-grid>

        <ui-grid [size]="{ xs: 12, md: 6 }">
          <ui-form-field label="Type" for="type" [required]="true" [control]="form.controls.type">
            <p-select
              formControlName="type"
              id="type"
              class="w-full"
              appendTo="body"
              [options]="typeOptions"
              optionValue="value"
              optionLabel="label"
            />
          </ui-form-field>
        </ui-grid>
      </ui-grid>

      <ui-form-field label="Notes" for="notes" hint="Optional notes about this entry">
        <textarea
          pTextarea
          id="notes"
          formControlName="notes"
          rows="3"
          placeholder="Add notes..."
          class="w-full"
        ></textarea>
      </ui-form-field>

      <ui-stack direction="row" justify="end" gap="2" class="mt-4">
        <p-button type="button" label="Cancel" [outlined]="true" (click)="close()" />
        <p-button
          type="submit"
          icon="pi pi-check"
          [label]="isEditMode ? 'Update' : 'Create'"
          [disabled]="isLoading() || form.invalid || timeError()"
        />
      </ui-stack>
    </form>
  }
</p-dialog>
