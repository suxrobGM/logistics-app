<ui-page-header
  title="Search Load Boards"
  subtitle="Find available freight from DAT, Truckstop, and 123Loadboard"
  backLink="/loadboard"
/>

<ui-dashboard-card title="Search Filters" icon="pi-filter" class="mb-6 block">
  <app-loadboard-search-filters [searching]="searching()" (searched)="onSearch($event)" />
</ui-dashboard-card>

<ui-dashboard-card title="Search Results" icon="pi-list">
  @if (searching()) {
    <ui-stack align="center" justify="center" class="p-5">
      <p-progressSpinner />
    </ui-stack>
  } @else if (listings().length === 0) {
    <ui-empty-state
      title="No loads found"
      [message]="
        searched()
          ? 'Try adjusting your search criteria.'
          : 'Enter search criteria and click Search Loads.'
      "
      icon="search"
    />
  } @else {
    <app-loadboard-search-results [listings]="listings()" (book)="openBookDialog($event)" />
  }
</ui-dashboard-card>

<app-book-load-dialog
  [(visible)]="showBookDialog"
  [listing]="selectedListing()"
  [booking]="booking()"
  [trucks]="store.trucks()"
  (submitted)="onBook($event)"
/>
