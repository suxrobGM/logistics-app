<div class="truck-documents-page mx-auto max-w-7xl p-6">
  <div class="page-header border-subtle mb-6 border-b pb-4">
    <ui-stack direction="row" align="center" justify="between">
      <div>
        <ui-typography variant="h2" tag="h1" color="primary" class="mb-2">
          Truck Documents
        </ui-typography>
        <ui-typography color="secondary">
          Manage documents for truck: {{ truck()?.number }}
        </ui-typography>
      </div>
      <p-button
        icon="pi pi-arrow-left"
        label="Back to Trucks"
        [routerLink]="['/trucks']"
        [outlined]="true"
      />
    </ui-stack>
  </div>

  <app-document-manager [truckId]="id()" [types]="truckDocTypes" />
</div>
