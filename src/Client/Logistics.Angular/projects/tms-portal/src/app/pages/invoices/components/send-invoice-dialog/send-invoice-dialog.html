<p-dialog
  header="Send Invoice"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '450px' }"
  (onShow)="onShow()"
  (onHide)="close()"
>
  <p class="text-muted-color mb-4">Send this invoice to the customer via email.</p>

  <form [formGroup]="form" (ngSubmit)="send()">
    <ui-form-field label="Email Address" for="email" [required]="true" [control]="form.controls.email">
      <input
        pInputText
        id="email"
        formControlName="email"
        type="email"
        placeholder="customer@example.com"
        class="w-full"
      />
    </ui-form-field>

    <ui-form-field label="Personal Message" for="personalMessage">
      <textarea
        pTextarea
        id="personalMessage"
        formControlName="personalMessage"
        rows="3"
        placeholder="Add an optional message to include in the email..."
        class="w-full"
      ></textarea>
    </ui-form-field>

    <ui-stack direction="row" justify="end" gap="2">
      <p-button type="button" label="Cancel" [outlined]="true" (click)="close()" />
      <p-button
        type="submit"
        icon="pi pi-send"
        label="Send Invoice"
        [loading]="isSending()"
        [disabled]="form.invalid"
      />
    </ui-stack>
  </form>
</p-dialog>
