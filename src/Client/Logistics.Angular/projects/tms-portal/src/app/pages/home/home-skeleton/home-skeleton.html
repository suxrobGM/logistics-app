<div class="grid w-full grid-cols-12 gap-2" [style.grid-auto-rows]="rowHeightPx()">
  @for (panel of panels(); track panel.id) {
    <div
      class="min-h-0 min-w-0"
      [style.grid-column]="panel.gridColumn"
      [style.grid-row]="panel.gridRow"
    >
      <p-skeleton width="100%" height="100%" styleClass="rounded-lg" />
    </div>
  }
</div>
