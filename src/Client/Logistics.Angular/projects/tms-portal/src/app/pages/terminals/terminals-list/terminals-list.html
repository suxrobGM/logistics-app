<ui-page-header title="Terminals" addRoute="/terminals/add" addTooltip="Add a new terminal" />

<p-card>
  <div class="mb-4 flex flex-wrap items-end gap-3">
    <div class="min-w-72 flex-1">
      <ui-search-input (searchChange)="search($event)" />
    </div>
    <p-select
      [options]="typeOptions"
      [showClear]="true"
      placeholder="All types"
      (onChange)="onTypeChange($event.value)"
    />
    <input
      type="text"
      placeholder="Country code (e.g., US, NL)"
      class="border-default bg-elevated rounded border px-3 py-2 text-sm"
      maxlength="2"
      (input)="onCountryChange($any($event.target).value)"
    />
  </div>

  <ui-data-container
    [loading]="store.isLoading()"
    [error]="store.error()"
    [isEmpty]="store.isEmpty()"
    skeletonVariant="table"
    [skeletonRows]="10"
    emptyTitle="No terminals yet"
    emptyMessage="Add your first terminal to get started."
    emptyActionLabel="Add Terminal"
    (retry)="store.retry()"
    (emptyAction)="addTerminal()"
  >
    <p-table
      [value]="store.data()"
      [lazy]="true"
      [paginator]="true"
      [showCurrentPageReport]="true"
      (onLazyLoad)="store.onLazyLoad($event)"
      [rows]="store.pageSize()"
      [first]="store.first()"
      [totalRecords]="store.totalRecords()"
      [loading]="store.isLoading()"
      [rowsPerPageOptions]="[10, 25, 50]"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="Code">
            Code
            <p-sortIcon field="Code" />
          </th>
          <th pSortableColumn="Name">
            Name
            <p-sortIcon field="Name" />
          </th>
          <th>Country</th>
          <th>Type</th>
          <th>City</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template #body let-terminal>
        <tr class="cursor-pointer" (click)="editTerminal(terminal)">
          <td class="font-mono font-medium">{{ terminal.code || "-" }}</td>
          <td>{{ terminal.name || "-" }}</td>
          <td>{{ terminal.countryCode || "-" }}</td>
          <td>{{ typeLabel(terminal.type) }}</td>
          <td>{{ terminal.address?.city || "-" }}</td>
          <td>
            <p-button
              icon="pi pi-pencil"
              [text]="true"
              aria-label="Edit terminal"
              (click)="$event.stopPropagation(); editTerminal(terminal)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ui-data-container>
</p-card>
