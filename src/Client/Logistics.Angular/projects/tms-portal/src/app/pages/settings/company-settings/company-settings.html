<h1 class="text-center">Company Settings</h1>

<div class="flex justify-center">
  <div class="w-full md:w-2/3 lg:w-1/2">
    <p-card>
      @if (isLoading()) {
        <div class="flex justify-center py-8">
          <p-progress-spinner />
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="save()">
          <ui-validation-summary [form]="form" />

          <!-- Logo Upload Section -->
          <div class="mb-6">
            <ui-form-field label="Company Logo">
              <div class="flex items-center gap-4">
                <!-- Logo Preview -->
                <div
                  class="border-default flex h-24 w-24 items-center justify-center overflow-hidden rounded-lg border-2 border-dashed"
                >
                  @if (logoPreviewUrl()) {
                    <img
                      [src]="logoPreviewUrl()"
                      alt="Company logo"
                      class="h-full w-full object-contain"
                    />
                  } @else {
                    <i class="pi pi-image text-muted text-3xl"></i>
                  }
                </div>
                <!-- Upload Button -->
                <div>
                  <input
                    type="file"
                    class="hidden"
                    #logoInput
                    accept="image/*"
                    (change)="onLogoSelected($event)"
                  />
                  <p-button
                    type="button"
                    icon="pi pi-upload"
                    label="Upload Logo"
                    (click)="logoInput.click()"
                    [loading]="isUploadingLogo()"
                  />
                  <p class="text-muted mt-1 text-xs">PNG, JPG or GIF. Max 5MB.</p>
                </div>
              </div>
            </ui-form-field>
          </div>

          <!-- Company Name -->
          <ui-form-field label="Company Name" for="companyName" [required]="true">
            <input pInputText formControlName="companyName" id="companyName" class="w-full" />
          </ui-form-field>

          <!-- Phone Number -->
          <ui-form-field label="Phone Number" for="phoneNumber">
            <ui-phone-input formControlName="phoneNumber" />
          </ui-form-field>

          <!-- Billing Email -->
          <ui-form-field label="Billing Email" for="billingEmail" [required]="true">
            <input
              pInputText
              formControlName="billingEmail"
              id="billingEmail"
              type="email"
              class="w-full"
            />
          </ui-form-field>

          <!-- DOT Number -->
          <ui-form-field label="US DOT Number" for="dotNumber">
            <input pInputText formControlName="dotNumber" id="dotNumber" class="w-full" />
          </ui-form-field>

          <!-- Company Address -->
          <ui-form-field label="Company Address" [required]="true">
            <ui-address-form
              formControlName="companyAddress"
              [allowedCountries]="allowedCountries()"
            />
          </ui-form-field>

          <!-- Regional Settings Section -->
          <div class="border-default mt-8 border-t pt-6">
            <h2 class="mb-4 text-lg font-semibold">Regional Settings</h2>

            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <!-- Distance Unit -->
              <ui-form-field label="Distance Unit" for="distanceUnit">
                <p-select
                  id="distanceUnit"
                  formControlName="distanceUnit"
                  [options]="distanceUnitOptions"
                  optionLabel="label"
                  optionValue="value"
                  styleClass="w-full"
                />
              </ui-form-field>

              <!-- Weight Unit -->
              <ui-form-field label="Weight Unit" for="weightUnit">
                <p-select
                  id="weightUnit"
                  formControlName="weightUnit"
                  [options]="weightUnitOptions"
                  optionLabel="label"
                  optionValue="value"
                  styleClass="w-full"
                />
              </ui-form-field>

              <!-- Date Format -->
              <ui-form-field label="Date Format" for="dateFormat">
                <p-select
                  id="dateFormat"
                  formControlName="dateFormat"
                  [options]="dateFormatOptions"
                  optionLabel="label"
                  optionValue="value"
                  styleClass="w-full"
                />
              </ui-form-field>

              <!-- Timezone -->
              <ui-form-field label="Timezone" for="timezone">
                <p-select
                  id="timezone"
                  formControlName="timezone"
                  [options]="timezoneOptions"
                  optionLabel="label"
                  optionValue="value"
                  styleClass="w-full"
                  [filter]="true"
                  filterPlaceholder="Search timezone..."
                />
              </ui-form-field>
            </div>
          </div>

          <!-- Actions -->
          <div class="mt-6 flex gap-2">
            <p-button
              type="submit"
              icon="pi pi-save"
              label="Save Changes"
              [loading]="isSaving()"
              [disabled]="form.invalid"
            />
          </div>
        </form>
      }
    </p-card>
  </div>
</div>
