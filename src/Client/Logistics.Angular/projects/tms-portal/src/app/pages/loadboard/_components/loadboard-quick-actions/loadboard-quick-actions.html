<p-card class="border-0 shadow-sm">
  <ng-template #header>
    <ui-stack direction="row" align="center" gap="2" class="p-3">
      <ui-icon name="bolt" color="warning" />
      <ui-typography variant="h5" class="mb-0">Quick Actions</ui-typography>
    </ui-stack>
  </ng-template>

  <ui-grid container spacing="4">
    @for (action of actions; track action.route) {
      <ui-grid [size]="{ xs: 12, md: 4 }">
        <p-button
          [outlined]="true"
          severity="secondary"
          styleClass="w-full justify-start gap-3 p-4 h-auto text-left"
          (onClick)="navigate(action.route)"
        >
          <div class="flex items-center gap-3">
            <div class="bg-subtle flex h-12 w-12 items-center justify-center rounded-full">
              <ui-icon [name]="action.icon" size="lg" [color]="action.iconColor" />
            </div>
            <div>
              <ui-typography variant="h6" class="mb-1">{{ action.label }}</ui-typography>
              <ui-typography variant="body-sm" color="muted" class="mb-0">
                {{ action.description }}
              </ui-typography>
            </div>
          </div>
        </p-button>
      </ui-grid>
    }
  </ui-grid>
</p-card>
