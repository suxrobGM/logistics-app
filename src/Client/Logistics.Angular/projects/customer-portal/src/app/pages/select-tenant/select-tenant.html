<div class="flex min-h-screen items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-2xl">
    <ui-stack align="center" gap="2" class="mb-8 text-center">
      <ui-icon name="box" size="xl" class="text-primary mb-4" />
      <ui-typography variant="h2" tag="h1" align="center">Select Company</ui-typography>
      <ui-typography variant="body" color="muted" align="center">Choose which company you'd like to access</ui-typography>
    </ui-stack>

    @if (isLoading()) {
      <ui-stack direction="row" justify="center" class="py-12">
        <p-progress-spinner strokeWidth="4" />
      </ui-stack>
    } @else {
      <ui-grid container spacing="4">
        @for (tenant of tenants(); track tenant.id) {
          <ui-grid [size]="{ xs: 12, md: 6 }">
            <button
              type="button"
              class="group hover:border-primary focus:ring-primary block w-full rounded-lg border border-gray-200 bg-white p-6 text-left transition-all hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2"
              (click)="selectTenant(tenant)"
            >
              <ui-stack direction="row" align="start" gap="4">
                <div
                  class="bg-primary-50 text-primary group-hover:bg-primary flex h-12 w-12 items-center justify-center rounded-lg group-hover:text-white"
                >
                  <ui-icon name="building" size="lg" />
                </div>
                <div class="flex-1">
                  <ui-typography variant="body" weight="semibold">
                    {{ tenant.companyName || tenant.tenantName }}
                  </ui-typography>
                  @if (tenant.customerName) {
                    <ui-typography variant="body-sm" color="muted" class="mt-1">Customer: {{ tenant.customerName }}</ui-typography>
                  }
                  @if (tenant.lastAccessedAt) {
                    <ui-typography variant="caption" color="muted" class="mt-1 block">
                      Last accessed: {{ tenant.lastAccessedAt | date: "short" }}
                    </ui-typography>
                  }
                </div>
                <ui-icon name="chevron-right" color="muted" />
              </ui-stack>
            </button>
          </ui-grid>
        }
      </ui-grid>

      @if (tenants().length === 0) {
        <ui-surface variant="elevated" padding="lg" class="block text-center">
          <ui-icon name="exclamation-triangle" size="xl" class="text-yellow-500 mb-4" />
          <ui-typography variant="h5" tag="h3" class="mb-2">No Access</ui-typography>
          <ui-typography variant="body" color="muted" class="mb-6">
            You don't have access to any companies. Please contact your administrator.
          </ui-typography>
          <p-button
            label="Sign Out"
            icon="pi pi-sign-out"
            [outlined]="true"
            (click)="logout()"
          />
        </ui-surface>
      }
    }
  </div>
</div>
