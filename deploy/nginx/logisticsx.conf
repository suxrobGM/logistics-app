# LogisticsX Nginx Configuration (host-managed reverse proxy)
#
# This file is the source of truth; it is NOT deployed by CI. Apply changes manually:
#   1. sudo cp logisticsx.conf /etc/nginx/sites-available/logisticsx.conf
#   2. sudo ln -s /etc/nginx/sites-available/logisticsx.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# SSL with Certbot (run after nginx is configured and DNS A-records exist):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.logisticsx.app -d id.logisticsx.app -d admin.logisticsx.app -d tms.logisticsx.app -d customer.logisticsx.app -d portainer.logisticsx.app -d logisticsx.app
#   sudo certbot renew --dry-run   # verify auto-renewal

map $http_connection $connection_upgrade {
    "~*Upgrade" $http_connection;
    default keep-alive;
}

# API
server {
    listen 80;
    listen [::]:80;
    server_name api.logisticsx.app;

    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Identity Server
server {
    listen 80;
    listen [::]:80;
    server_name id.logisticsx.app;

    location / {
        proxy_pass http://127.0.0.1:7001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Larger buffer sizes for auth cookies/headers
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

