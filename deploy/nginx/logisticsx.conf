# Portainer (loopback-only container port; not publicly exposed)
server {
    listen 80;
    listen [::]:80;
    server_name portainer.logisticsx.app;

    # Allow image/stack uploads through the proxy
    client_max_body_size 512m;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep the container console / exec terminal (long-lived WebSocket) alive
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# Website (Landing Page)
